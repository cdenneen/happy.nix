name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Flake check
        run: nix flake check

      - name: Eval modules
        run: |
          nix eval --impure --expr '
            let
              flake = builtins.getFlake (toString ./.);
              lib = flake.inputs.nixpkgs.lib;
              eval = lib.evalModules { modules = [ flake.nixosModules.happy-server ]; };
            in eval.options.services.happy-server.enable
          '
          nix eval --impure --expr '
            let
              flake = builtins.getFlake (toString ./.);
              lib = flake.inputs.nixpkgs.lib;
              eval = lib.evalModules { modules = [ flake.nixosModules.happy-codex-agent ]; };
            in eval.options.services."happy-codex-agent".enable
          '
          nix eval --impure --expr '
            let
              flake = builtins.getFlake (toString ./.);
              lib = flake.inputs.nixpkgs.lib;
              eval = lib.evalModules { modules = [ flake.nixosModules.happy-agent ]; };
            in eval.options.services."happy-agent".enable
          '

      - name: Install Podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Smoke test happy-server app
        run: |
          set -euo pipefail
          HAPPY_SERVER_IMAGE=ghcr.io/cdenneen/happy-server:latest \
            HANDY_MASTER_SECRET=ci-secret \
            nix run .#happy-server &
          app_pid=$!
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 http://localhost:3000/health > /dev/null; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              kill "$app_pid" || true
              exit 1
            fi
            sleep 2
          done
          curl -fsS http://localhost:3000/health
          kill "$app_pid" || true
