name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Flake check
        run: nix flake check
