name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13

      - name: Flake check
        run: nix flake check

      - name: Eval modules
        run: |
          nix eval .#nixosModules.happy-server.options.services.happy-server.enable
          nix eval .#nixosModules.happy-codex-agent.options.services.happy-codex-agent.enable
          nix eval .#nixosModules.happy-agent.options.services.happy-agent.enable
          nix eval .#nixosModules.happy-stack.options.services.happy-stack.enable
